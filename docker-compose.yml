services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: resume_assistant
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - resume-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - resume-net

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: resume
      RABBITMQ_DEFAULT_PASS: resume123
    networks:
      - resume-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - resume-net

  nacos:
    image: nacos/nacos-server:v2.3.2
    ports:
      - "4348:8848"
      - "5348:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    networks:
      - resume-net

networks:
  resume-net:
    driver: bridge

volumes:
  pgdata:
  minio_data:
