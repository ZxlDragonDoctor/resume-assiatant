server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: resume-service
          uri: lb://resume-service
          predicates:
            - Path=/api/resumes/**
        - id: template-service
          uri: lb://template-service
          predicates:
            - Path=/api/templates/**
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/files/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

    nacos:
      discovery:
        server-addr: localhost:8853

